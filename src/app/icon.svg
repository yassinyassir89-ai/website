<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background with brand gradient (pink → gold) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#D4B483"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- GB monogram in white serif (Playfair-like) -->
  <text x="16" y="22" text-anchor="middle" fill="#ffffff" font-family="'Playfair Display', 'Georgia', serif" font-size="18" font-weight="500" letter-spacing="-1">
    GB
  </text>

  <!-- Tiny leaf accent on the side -->
  <ellipse cx="24" cy="10" rx="2" ry="1" fill="#ffffff" opacity="0.6" transform="rotate(35 24 10)"/>
</svg>
